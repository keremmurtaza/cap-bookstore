_schema-version: 3.3.0
ID: bookstore
description: A simple CAP project.
version: 1.0.0
modules:
  - name: bookstore-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: bookstore-auth
      - name: bookstore-destination
      - name: bookstore-db
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: bookstore-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: bookstore-auth
      - name: srv-api
      - name: bookstore-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - bookstore-listview.zip
          name: bookstorebookstorelistview
          target-path: app/
        - artifacts:
            - bookstorelistview.zip
          name: bookstorelistview
          target-path: app/
  - name: bookstorebookstorelistview
    type: html5
    path: app/bookstore-listview
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
  - name: bookstore-destination-content
    type: com.sap.application.content
    requires:
      - name: bookstore-destination
        parameters:
          content-target: true
      - name: bookstore-html5-repo-host
        parameters:
          service-key:
            name: bookstore-html5-repo-host-key
      - name: bookstore-auth
        parameters:
          service-key:
            name: bookstore-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: bookstore_html_repo_host
              ServiceInstanceName: bookstore-html5-service
              ServiceKeyName: bookstore-html5-repo-host-key
              sap.cloud.service: bookstore
            - Authentication: OAuth2UserTokenExchange
              Name: bookstore_uaa
              ServiceInstanceName: bookstore-xsuaa-service
              ServiceKeyName: bookstore-auth-key
              sap.cloud.service: bookstore
          existing_destinations_policy: update
    build-parameters:
      no-source: true
  - name: bookstorelistview
    type: html5
    path: app/bookstore-listview
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: bookstore-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bookstore-db
resources:
  - name: bookstore-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: bookstore-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-name: bookstore-xsuaa-service
      service-plan: application
  - name: bookstore-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: bookstore-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: bookstore-html5-service
      service-plan: app-host
  - name: bookstore-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
