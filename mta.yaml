_schema-version: 3.3.0
ID: bookstore-v2
version: 1.0.0
description: "A simple CAP project - Version 2"
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: bookstore-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: bookstore-auth
      - name: bookstore-db-v2
      - name: bookstore-destination

  - name: bookstore-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: bookstore-db-v2

  - name: bookstore-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: bookstore-auth
      - name: srv-api
      - name: bookstore-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: bookstorebookstorelistview
          artifacts:
            - bookstore-listview.zip
          target-path: app/

  - name: bookstorebookstorelistview
    type: html5
    path: app/bookstore-listview
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build

  - name: bookstore-destinations
    type: com.sap.application.content
    requires:
      - name: bookstore-auth
        parameters:
          service-key:
            name: bookstore-auth-key
      - name: bookstore-html5-repo-host
        parameters:
          service-key:
            name: bookstore-html5-repo-host-key
      - name: srv-api
      - name: bookstore-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: bookstore-html5-repository
              ServiceInstanceName: bookstore-html5-repo-host
              ServiceKeyName: bookstore-html5-repo-host-key
              sap.cloud.service: bookstore.service
            - Name: bookstore-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: bookstore-xsuaa-service
              ServiceKeyName: bookstore-auth-key
              sap.cloud.service: bookstore.service

resources:
  - name: bookstore-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      service-name: bookstore-xsuaa-service
      path: ./xs-security.json
      config:
        xsappname: bookstore-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
  - name: bookstore-db-v2
    type: com.sap.xs.hdi-container
    parameters: