_schema-version: 3.3.0
ID: bookstore-v2
description: A simple CAP project.
version: 1.0.0
modules:
  - name: bookstore-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: bookstore-db-v2
      - name: bookstore-auth
      - name: bookstore-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci

  - name: bookstore-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: bookstore-db-v2
    parameters:
      buildpack: nodejs_buildpack

  - name: bookstore-destination-content
    type: com.sap.application.content
    requires:
      - name: bookstore-destination
        parameters:
          content-target: true
      - name: bookstore-auth
        parameters:
          service-key:
            name: bookstore-auth-key
      - name: bookstore-html5-repo-host
        parameters:
          service-key:
            name: bookstore-html5-repo-host-key
      - name: srv-api
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          destinations:
            - Authentication: OAuth2UserTokenExchange
              Name: bookstore-app-auth
              ServiceInstanceName: bookstore-xsuaa-service
              ServiceKeyName: bookstore-auth-key
              sap.cloud.service: bookstore.service
            - Name: bookstore-srv-api
              TokenServiceInstanceName: bookstore-xsuaa-service
              TokenServiceKeyName: bookstore-auth-key
              URL: ~{srv-api/srv-url}
              sap.cloud.service: bookstore.service
          existing_destinations_policy: update

  - name: bookstore-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: bookstore-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - bookstore-listview.zip
          name: bookstore-listview
          target-path: resources/

  - name: bookstore-listview
    type: html5
    path: app/bookstore-listview
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms: []

resources:
  - name: bookstore-db-v2
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: bookstore-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        tenant-mode: dedicated
        xsappname: bookstore-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-name: bookstore-xsuaa-service
      service-plan: application
  - name: bookstore-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
      service: destination
      service-plan: lite
  - name: bookstore-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production